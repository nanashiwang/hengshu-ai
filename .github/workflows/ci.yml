name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: typecheck + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
# 说明：typecheck + 单测无需 DB/密钥，确定性绿。
# build/lint 依赖 DATABASE_URL/PAYLOAD_SECRET 等运行期 env，待配置 CI secrets 后再加 job，避免长期红灯。
